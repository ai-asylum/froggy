name: Release

# Build installers for macOS, Windows and Linux and publish them to a GitHub
# Release. Triggered by pushing a version tag (e.g. `v1.0.1`), or manually from
# the Actions tab. electron-builder uploads the artifacts to a draft release
# for the tag, which you then review and publish.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and publish
        run: npm run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # We ship unsigned builds; don't let electron-builder try (and fail)
          # to auto-discover a macOS signing identity.
          CSC_IDENTITY_AUTO_DISCOVERY: false
