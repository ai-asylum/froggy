name: Release

# Build installers for macOS, Windows and Linux and publish them to a GitHub
# Release. Triggered by pushing a version tag (e.g. `v1.0.1`), or manually from
# the Actions tab. electron-builder uploads the artifacts to a draft release
# for the tag, which you then review and publish.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # node-gyp's bundled gyp still imports distutils, which was removed from
      # the Python 3.12+ stdlib shipped on the runners. Pin 3.11 so the native
      # rebuild of uiohook-napi works on every OS.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # uiohook-napi is a native module that links against X11 at build time.
      # The GitHub-hosted Ubuntu runners don't ship these headers by default.
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libxtst-dev \
            libxt-dev \
            libxinerama-dev \
            libxrandr-dev \
            libx11-xcb-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libxkbfile-dev

      - name: Install dependencies
        run: npm ci

      - name: Build and publish
        run: npm run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # We ship unsigned builds; don't let electron-builder try (and fail)
          # to auto-discover a macOS signing identity.
          CSC_IDENTITY_AUTO_DISCOVERY: false
