<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline';" />
    <link rel="stylesheet" href="shout.css" />
  </head>
  <body>
    <div id="card">
      <div id="title">📣 SHOUT TO EVERYONE</div>
      <textarea id="entry" rows="2" maxlength="140" placeholder="TYPE IN CAPS..." autofocus></textarea>
      <div id="row">
        <span id="hint">Enter to shout</span>
        <div class="spacer"></div>
        <button id="send" class="primary">Shout</button>
      </div>
    </div>
    <script src="shout.js"></script>
  </body>
</html>
