<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline';" />
    <link rel="stylesheet" href="name.css" />
  </head>
  <body>
    <div id="card">
      <button id="close" aria-label="Quit">&times;</button>
      <div id="title">Name your frog</div>
      <div id="sub">This is how friends will see you.</div>
      <input id="entry" maxlength="40" placeholder="e.g. Grof" autofocus />
      <div id="colors" aria-label="Pick a color"></div>
      <button id="save" class="primary">Hop In</button>
    </div>
    <script src="name.js"></script>
  </body>
</html>
