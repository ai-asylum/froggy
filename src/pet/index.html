<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline';" />
    <link rel="stylesheet" href="pet.css" />
  </head>
  <body>
    <div id="stage">
      <canvas id="frog" width="160" height="190"></canvas>

      <!-- The frog is itself a slot (the 4th): this badge sits on its body and
           shows the app assigned to it. Purely visual — the frog's own click /
           long-press / right-click handlers (in pet.js) drive it. -->
      <div id="petslot" class="petslot empty" aria-hidden="true"></div>

      <!-- Shared timer readout, floating on the transparent window just above
           the frog. Used by both the Pomodoro and Countdown apps; pet.js toggles
           .visible and fills it from their state broadcasts. -->
      <div id="timer" class="timer" aria-hidden="true">
        <div id="timer-label" class="timer-label">Focus</div>
        <div id="timer-time" class="timer-time">25:00</div>
        <div id="timer-hint" class="timer-hint">tap to start break</div>
      </div>

      <!-- End-of-reminder message, floating above the frog in the same readout
           style as the timer. Used by the Water reminder and the Countdown's
           "time's up"; pet.js fills it, tints it per-app, and auto-hides it. -->
      <div id="frogmsg" class="timer msg" aria-hidden="true">
        <div id="frogmsg-label" class="timer-label"></div>
        <div id="frogmsg-text" class="timer-msg-text"></div>
      </div>

      <!-- Shared hover label; centered so it never clips the small window. -->
      <div id="tip" aria-hidden="true"></div>

      <!-- Speech bubble for your own shouts: a red, all-caps bubble that floats
           above the frog's head and auto-hides. Filled by pet.js on shout:show. -->
      <div id="bubble" class="bubble" aria-hidden="true"><span id="bubbletext"></span></div>

      <!-- Semi-circle of app slots above the frog (shown on hover). Each is
           filled from config.slots by pet.js: click launches the app, an empty
           slot or a long-press / right-click opens the picker. -->
      <button class="arcbtn slot" data-slot="0" aria-label="App slot 1"></button>
      <button class="arcbtn slot" data-slot="1" aria-label="App slot 2"></button>
      <button class="arcbtn slot" data-slot="2" aria-label="App slot 3"></button>

      <!-- Notification beacon: while an app / friend invite / journal nag wants
           attention, pet.js hides the app buttons and flashes this in the center
           slot's spot with the notifier's icon. Purely a signal — tap the frog. -->
      <div id="notif" class="notif" aria-hidden="true"></div>

      <!-- Gear glyph from the Lucide icon pack (source asset: assets/icons/settings.svg).
           Inlined so it inherits the button's white color; the renderer's CSP blocks
           direct file:// references (same reason main.js base64-inlines the frog art). -->
      <button id="gear" class="petbtn" title="Settings" aria-label="Settings" data-tip="Settings">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M9.671 4.136a2.34 2.34 0 0 1 4.659 0 2.34 2.34 0 0 0 3.319 1.915 2.34 2.34 0 0 1 2.33 4.033 2.34 2.34 0 0 0 0 3.831 2.34 2.34 0 0 1-2.33 4.033 2.34 2.34 0 0 0-3.319 1.915 2.34 2.34 0 0 1-4.659 0 2.34 2.34 0 0 0-3.32-1.915 2.34 2.34 0 0 1-2.33-4.033 2.34 2.34 0 0 0 0-3.831A2.34 2.34 0 0 1 6.35 6.051a2.34 2.34 0 0 0 3.319-1.915" />
          <circle cx="12" cy="12" r="3" />
        </svg>
      </button>
      <button id="quit" class="petbtn" title="Quit Froggy" aria-label="Quit" data-tip="Quit">
        <svg viewBox="0 0 24 24" width="13" height="13" aria-hidden="true">
          <path fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" d="M6 6l12 12M18 6L6 18"/>
        </svg>
      </button>
    </div>
    <script src="engine.js"></script>
    <script src="pet.js"></script>
  </body>
</html>
