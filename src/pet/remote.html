<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline';" />
    <link rel="stylesheet" href="remote.css" />
  </head>
  <body>
    <div id="stage">
      <canvas id="frog" width="120" height="112"></canvas>
      <div id="bubble" class="bubble">
        <span id="bubbletext"></span>
        <button id="bubbleclose" class="bubbleclose" aria-label="Close">×</button>
      </div>
      <div id="meta" class="meta">
        <div id="nametag" class="nametag"></div>
        <div id="roomtag" class="roomtag"></div>
        <button id="addfriend" class="addfriend" type="button" title="Add friend" aria-label="Add friend">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
            <path fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" d="M9 11a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7zM3 20c0-3 2.7-5 6-5s6 2 6 5M18 8v6M21 11h-6"/>
          </svg>
        </button>
      </div>
      <button id="close" class="closebtn" title="Remove friend" aria-label="Remove friend">
        <svg viewBox="0 0 24 24" width="9" height="9" aria-hidden="true">
          <path fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" d="M6 6l12 12M18 6L6 18"/>
        </svg>
      </button>
    </div>
    <script src="engine.js"></script>
    <script src="remote.js"></script>
  </body>
</html>
