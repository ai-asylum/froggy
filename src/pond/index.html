<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline';"
    />
    <link rel="stylesheet" href="pond.css" />
  </head>
  <body>
    <!-- Everything lives on the stage so the whole pond can bounce in with a
         scale animation when it appears. -->
    <div id="stage">
      <!-- The pond art is the OS-level drag handle (the whole window moves as
           one, frogs and furniture glued on top by main). Drag regions swallow
           the renderer's mouse events, so hover is driven by main watching the
           global cursor (see the body.hovered class). -->
      <img id="bg" alt="" draggable="false" />

      <!-- Room chip (top-left) + the pond's actions (top-center): big round
           app buttons like the frog's, revealed while the pond is hovered. -->
      <div id="chip" hidden></div>
      <div id="buttons">
        <button id="hopout" class="pondbtn" title="Hop out — hide the pond">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path
              fill="none"
              stroke="currentColor"
              stroke-width="2.2"
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M13 4h4a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-4M10 8l-4 4 4 4M6 12h9"
            />
          </svg>
        </button>
        <button id="decor" class="pondbtn" title="Furniture">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M6 11V7a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v4"
            />
            <path
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M6 11a2 2 0 1 0-2 3.4V17a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-2.6A2 2 0 1 0 18 11v2H6v-2zM7 18v1.5M17 18v1.5"
            />
          </svg>
        </button>
        <button id="roominfo" class="pondbtn" title="Room info">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
            <path
              fill="currentColor"
              d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8zm0 2c-4.4 0-8 2.2-8 5v1h16v-1c0-2.8-3.6-5-8-5z"
            />
          </svg>
        </button>
      </div>

      <!-- Furniture pieces live here as absolutely-positioned slices of the
           shared spritesheets, laid out in pond coordinates. -->
      <div id="pieces"></div>
    </div>

    <script src="pond.js"></script>
  </body>
</html>
