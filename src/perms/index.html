<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline';" />
    <link rel="stylesheet" href="perms.css" />
  </head>
  <body>
    <div id="card">
      <button id="close" aria-label="Not now">&times;</button>
      <div id="title">One quick permission</div>
      <div id="sub">So your frog can hop while you work.</div>
      <p id="why">
        Needs <b>Accessibility</b> access to hop as you type &mdash; it only
        counts key presses, never reads them.
      </p>
      <button id="grant" class="primary">Grant access</button>
      <button id="later" class="link">Maybe later</button>
    </div>
    <script src="perms.js"></script>
  </body>
</html>
